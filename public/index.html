<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrenador Personal IA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.25rem; }
    .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 1.5rem; }
    .section-label { font-size: 0.7rem; font-weight: 600; color: #999; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .box { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .box-header { display: flex; justify-content: space-between; align-items: center; }
    .box-title { font-weight: 500; font-size: 0.9rem; }
    .box-sub { font-size: 0.75rem; color: #888; margin-top: 2px; }
    .btn { font-size: 0.75rem; padding: 5px 14px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; background: transparent; color: #1a1a1a; transition: background 0.15s; }
    .btn:hover { background: #f0f0f0; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.success { background: #f0faf4; border-color: #86efac; color: #16a34a; }
    .btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-size: 0.9rem; padding: 0.75rem; width: 100%; border-radius: 10px; margin-bottom: 1rem; }
    .btn.primary:hover { background: #333; }
    .btn.primary:disabled { background: #e5e5e5; color: #999; border-color: #e5e5e5; }
    .stats { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .stat { background: #f5f5f5; border-radius: 8px; padding: 0.6rem 0.75rem; flex: 1; min-width: 80px; }
    .stat.highlight { background: #eff6ff; }
    .stat-label { font-size: 0.65rem; color: #888; margin-bottom: 2px; }
    .stat-value { font-size: 1.1rem; font-weight: 500; }
    .stat-unit { font-size: 0.65rem; color: #888; margin-left: 2px; }
    .stat.highlight .stat-value { color: #1d4ed8; }
    .meta { font-size: 0.7rem; color: #aaa; margin-top: 8px; }
    .activity { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-top: 1px solid #f0f0f0; font-size: 0.8rem; }
    .activity-name { color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 55%; }
    .activity-meta { color: #888; white-space: nowrap; }
    .analysis { font-size: 0.875rem; line-height: 1.8; white-space: pre-wrap; color: #1a1a1a; }
    .error { font-size: 0.75rem; color: #dc2626; margin-top: 8px; }
    .empty { text-align: center; padding: 2rem 0; color: #aaa; font-size: 0.85rem; }
    .regen { font-size: 0.75rem; padding: 4px 12px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; background: transparent; color: #888; margin-top: 10px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Entrenador personal IA</h1>
  <p class="subtitle">Conecta tus datos de salud y entreno para obtener un plan adaptado.</p>

  <div class="section-label">Salud — Health Auto Export</div>
  <div class="box">
    <div class="box-header">
      <div>
        <div class="box-title">CSV de salud</div>
        <div class="box-sub">FC reposo, HRV, sueño, VO2Max...</div>
      </div>
      <label>
        <input type="file" accept=".csv" id="csv-input" style="display:none" />
        <span class="btn" id="csv-btn" onclick="document.getElementById('csv-input').click()">Subir CSV</span>
      </label>
    </div>
    <div id="health-stats"></div>
    <div class="error" id="csv-error"></div>
  </div>

  <div class="section-label">Entrenos — Strava</div>
  <div class="box">
    <div class="box-header">
      <div>
        <div class="box-title">Strava</div>
        <div class="box-sub">Últimas 15 actividades</div>
      </div>
      <button class="btn" id="strava-btn" onclick="connectStrava()">Conectar ↗</button>
    </div>
    <div id="strava-list"></div>
    <div class="error" id="strava-error"></div>
  </div>

  <button class="btn primary" id="analyze-btn" onclick="runAnalysis()" disabled>Analizar y generar plan semanal →</button>

  <div id="analysis-section" style="display:none">
    <div class="section-label">Análisis y plan semanal</div>
    <div class="box">
      <div class="analysis" id="analysis-text"></div>
      <button class="regen" onclick="runAnalysis()">Regenerar</button>
    </div>
  </div>

  <div class="empty" id="empty-msg">Sube el CSV o conecta Strava para empezar</div>
</div>

<script>
let healthData = null;
let activities = [];

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().replace(/"/g, ""));
  const rows = lines.slice(1).map(line => {
    const vals = line.split(",").map(v => v.trim().replace(/"/g, ""));
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i]);
    return obj;
  }).filter(r => r[headers[0]]);

  const col = name => rows.map(r => parseFloat(r[name])).filter(v => !isNaN(v) && v > 0);
  const avg = arr => arr.length ? arr.reduce((s,v) => s+v,0)/arr.length : null;
  const last = arr => arr.length ? arr[arr.length-1] : null;
  const h = name => ({ avg: avg(col(name))?.toFixed(1), last: last(col(name))?.toFixed(1) });

  return {
    hrResting: h("Frecuencia Cardiaca en Reposo (count/min)"),
    hrv: h("Variabilidad de Frecuencia Cardíaca (ms)"),
    spo2: h("Saturación de Oxígeno en Sangre (%)"),
    vo2max: h("VO2 Máx (ml/(kg·min))"),
    weight: h("Peso (kg)"),
    fatPct: h("Porcentaje de grasa corporal (%)"),
    sleep: {
      total: avg(col("Análisis del Sueño [Total] (hr)"))?.toFixed(1),
      deep: avg(col("Análisis del Sueño [Profundo] (hr)"))?.toFixed(1),
      rem: avg(col("Análisis del Sueño [REM] (hr)"))?.toFixed(1),
    },
    cardioRecovery: h("Recuperación Cardio (count/min)"),
    rowCount: rows.length,
    dateRange: rows.length ? `${rows[0][headers[0]]?.slice(0,10)} → ${rows[rows.length-1][headers[0]]?.slice(0,10)}` : null,
  };
}

function stat(label, value, unit, highlight) {
  return `<div class="stat${highlight?' highlight':''}">
    <div class="stat-label">${label}</div>
    <div class="stat-value">${value ?? '—'}<span class="stat-unit">${value ? unit : ''}</span></div>
  </div>`;
}

document.getElementById('csv-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('csv-error').textContent = '';
  document.getElementById('csv-btn').textContent = 'Cargando...';
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      healthData = parseCSV(ev.target.result);
      document.getElementById('csv-btn').className = 'btn success';
      document.getElementById('csv-btn').textContent = '✓ Cargado';
      document.getElementById('health-stats').innerHTML = `
        <div class="stats">
          ${stat('FC reposo', healthData.hrResting.last, 'bpm')}
          ${stat('HRV', healthData.hrv.last, 'ms', true)}
          ${stat('VO2Max', healthData.vo2max.last, 'ml/kg/min', true)}
        </div>
        <div class="stats">
          ${stat('Peso', healthData.weight.last, 'kg')}
          ${stat('Grasa', healthData.fatPct.last, '%')}
          ${stat('Sueño', healthData.sleep.total, 'h')}
        </div>
        <div class="meta">${healthData.dateRange} · ${healthData.rowCount} días</div>`;
      updateState();
    } catch {
      document.getElementById('csv-error').textContent = 'Error al parsear el CSV.';
      document.getElementById('csv-btn').textContent = 'Subir CSV';
    }
  };
  reader.readAsText(file);
});

async function connectStrava() {
  const btn = document.getElementById('strava-btn');
  const err = document.getElementById('strava-error');
  btn.textContent = 'Conectando...';
  btn.disabled = true;
  err.textContent = '';
  try {
    const res = await fetch('/api/strava');
    const data = await res.json();
    if (Array.isArray(data)) {
      activities = data;
      btn.className = 'btn success';
      btn.textContent = '✓ Conectado';
      const html = data.slice(0,6).map(a => {
        const dist = (a.distance/1000).toFixed(1);
        const mins = Math.round(a.moving_time/60);
        const hr = a.average_heartrate ? ` · ${Math.round(a.average_heartrate)}bpm` : '';
        return `<div class="activity">
          <div class="activity-name">${a.start_date?.slice(0,10)} · ${a.name}</div>
          <div class="activity-meta">${dist}km · ${mins}min${hr}</div>
        </div>`;
      }).join('');
      document.getElementById('strava-list').innerHTML = html;
      updateState();
    } else {
      err.textContent = 'Error: ' + (data.message || 'Token inválido');
      btn.textContent = 'Reintentar';
      btn.disabled = false;
    }
  } catch(e) {
    err.textContent = 'Error de conexión: ' + e.message;
    btn.textContent = 'Reintentar';
    btn.disabled = false;
  }
}

function updateState() {
  const hasData = healthData || activities.length > 0;
  document.getElementById('analyze-btn').disabled = !hasData;
  document.getElementById('empty-msg').style.display = hasData ? 'none' : 'block';
}

async function runAnalysis() {
  const btn = document.getElementById('analyze-btn');
  btn.textContent = 'Analizando...';
  btn.disabled = true;
  document.getElementById('analysis-section').style.display = 'none';

  const acts = activities.slice(0,8).map(a => {
    const dist = (a.distance/1000).toFixed(1);
    const mins = Math.round(a.moving_time/60);
    const hr = a.average_heartrate ? `${Math.round(a.average_heartrate)}bpm` : '';
    const elev = a.total_elevation_gain ? `+${Math.round(a.total_elevation_gain)}m` : '';
    return `- ${a.start_date?.slice(0,10)} | ${a.sport_type} | ${dist}km | ${mins}min | ${hr} | ${elev} | "${a.name}"`;
  }).join('\n') || 'No disponible';

  const prompt = `Eres un entrenador personal experto en running y trail running. Responde en español.

Analiza los datos y responde con estas 4 secciones:

**ESTADO DE FORMA**
(2-3 frases integrando salud y entrenos recientes)

**RECUPERACIÓN**
Nivel: Alto / Medio / Bajo
(justificación breve basada en HRV, FC reposo y carga reciente)

**PLAN PRÓXIMOS 7 DÍAS**
(4-5 sesiones concretas: tipo, distancia/duración, zona FC, objetivo)

**CONSEJO CLAVE**
(1 consejo específico y accionable)

---
DATOS DE SALUD:
- FC reposo: ${healthData?.hrResting.last ?? '—'} bpm (media ${healthData?.hrResting.avg ?? '—'})
- HRV: ${healthData?.hrv.last ?? '—'} ms (media ${healthData?.hrv.avg ?? '—'})
- SatO2: ${healthData?.spo2.last ?? '—'}%
- VO2Max: ${healthData?.vo2max.last ?? '—'} ml/kg/min
- Peso: ${healthData?.weight.last ?? '—'} kg | Grasa: ${healthData?.fatPct.last ?? '—'}%
- Sueño: ${healthData?.sleep.total ?? '—'}h total | ${healthData?.sleep.deep ?? '—'}h profundo | ${healthData?.sleep.rem ?? '—'}h REM
- Recuperación cardio: ${healthData?.cardioRecovery.last ?? '—'} bpm
- Periodo: ${healthData?.dateRange ?? '—'}

ACTIVIDADES STRAVA:
${acts}

PERFIL:
- Sergio, 44 años, 164cm, FC reposo habitual ~50bpm
- Objetivos: medio maratón asfalto 9 nov 2025 + Camino de Santiago Burgos→Santiago ~600km oct 2025
- Entrenos mañana en ayunas, fuerza tardes ~16:30h
- Calzado minimalista zero-drop`;

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    document.getElementById('analysis-text').textContent = data.text || 'Sin respuesta';
    document.getElementById('analysis-section').style.display = 'block';
  } catch(e) {
    document.getElementById('analysis-text').textContent = 'Error al analizar: ' + e.message;
    document.getElementById('analysis-section').style.display = 'block';
  }

  btn.textContent = 'Analizar y generar plan semanal →';
  btn.disabled = false;
}
</script>
</body>
</html>
